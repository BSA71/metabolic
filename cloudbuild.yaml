      - us-central1-docker.pkg.dev/metabolic-v1/metabolic/api:latest
      - .
images:
  - us-central1-docker.pkg.dev/metabolic-v1/metabolic/api:latest
options:
  logging: CLOUD_LOGGING_ONLY
